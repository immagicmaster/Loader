<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagicHub V1 – Roblox Script</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- TOOLBAR -->
  <header>
    <div class="logo">
      <img src="https://raw.githubusercontent.com/immagicmaster/MagicMaster/refs/heads/main/1782155766641.png" alt="Logo" />
      <span>MagicHub V1</span>
    </div>
    <nav>
      <button id="menu-toggle" aria-label="Menu">☰</button>
      <ul id="menu">
        <li><a href="#home">Home</a></li>
        <li><a href="#get-script">Get Script</a></li>
        <li><a href="#supported">Supported Games</a></li>
        <li><a href="#developer">Developer</a></li>
      </ul>
    </nav>
  </header>

  <!-- HOME -->
  <section id="home">
    <h1>The Best<br />Roblox Script<br />Tower Defense</h1>
    <div class="buttons">
      <button id="get-script-btn" class="btn-primary">Get Script</button>
      <button id="join-discord-btn" class="btn-secondary">Join Discord</button>
    </div>
  </section>

  <!-- GET SCRIPT -->
  <section id="get-script">
    <h2>Copy Our <span class="highlight">Script</span></h2>
    <div class="script-box">
      <button id="main-btn" class="btn-script">Main</button>
      <button id="farm-btn" class="btn-script">Farm</button>
    </div>
    <div id="link-display">
      <!-- Link sẽ hiển thị ở đây -->
    </div>
  </section>

  <!-- SUPPORTED GAMES -->
  <section id="supported">
    <h2>Supported</h2>
    <div class="supported-box">
      <ul>
        <li>Titan Tower Defense ✅️</li>
        <li>Skibidi Master TD ✅️</li>
        <li>Toilet Tower Defense (Legacy) ✅️</li>
        <li>ObfuscatorM ✅️</li>
      </ul>
    </div>
  </section>

  <!-- DEVELOPER -->
  <section id="developer">
    <h2>Developer</h2>
    <div class="dev-box">
      <img src="https://raw.githubusercontent.com/immagicmaster/MagicMaster/refs/heads/main/1782155766641.png" alt="Developer" />
      <h3>Magic_Master</h3>
      <p>Role : Owner👑</p>
    </div>
  </section>

  <!-- AUDIO (không hiển thị nút) -->
  <audio id="bg-music" loop preload="auto">
    <source src="https://github.com/immagicmaster/MagicMaster/raw/refs/heads/main/Music.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
